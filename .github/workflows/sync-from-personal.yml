name: Sync From Personal

on:
  workflow_dispatch:
    inputs:
      apply:
        description: Apply safe fast-forward Git ref updates after printing the plan.
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    if: github.repository == 'oaslananka-lab/cifence'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
      - name: Print sync plan
        shell: bash
        run: |
          set -euo pipefail
          node scripts/sync-repositories.mjs --check

  apply:
    if: github.repository == 'oaslananka-lab/cifence' && github.event_name == 'workflow_dispatch' && inputs.apply == true
    needs: plan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.15.0
      - name: Apply Git ref sync
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/oaslananka-lab/cifence.git"
          node scripts/sync-repositories.mjs --apply
