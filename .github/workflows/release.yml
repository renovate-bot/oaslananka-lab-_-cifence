name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release-please:
    if: github.repository == 'oaslananka-lab/cifence' && vars.CIFENCE_RELEASE_AUTOMATION_ENABLED == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      tag-name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.3
          cache: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          package-manager-cache: false
      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
      - name: Install Node dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
      - name: Refresh generated files on release PR
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          branch="$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --label "autorelease: pending" --json headRefName --jq 'map(select(.headRefName | startswith("release-please--"))) | .[0].headRefName // ""')"
          if [[ -z "$branch" ]]; then
            echo "No release-please PR branch found."
            exit 0
          fi
          git fetch origin "$branch"
          git switch "$branch"
          pnpm run action:build
          if git diff --quiet -- dist/index.js dist/bin; then
            echo "Generated files already fresh on release PR."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/index.js dist/bin
          git commit -m "chore(release): refresh packaged action"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${branch}"

  release-assets:
    if: ${{ github.repository == 'oaslananka-lab/cifence' && vars.CIFENCE_RELEASE_AUTOMATION_ENABLED == 'true' && needs.release-please.outputs.release-created == 'true' }}
    needs: release-please
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.0
        with:
          ref: ${{ needs.release-please.outputs.tag-name }}
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.3
          cache: false
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          package-manager-cache: false
      - name: Enable pnpm
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
      - name: Install Node dependencies
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
      - name: Build release binaries
        run: |
          set -euo pipefail
          pnpm run action:build
      - name: Create release asset directory
        run: |
          set -euo pipefail
          mkdir -p release-assets
      - name: Generate SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: release-assets/cifence-sbom.spdx.json
      - name: Prepare release assets
        env:
          CIFENCE_RELEASE_TAG: ${{ needs.release-please.outputs.tag-name }}
          CIFENCE_RELEASE_SEMVER: ${{ needs.release-please.outputs.version }}
        run: |
          set -euo pipefail
          node scripts/prepare-release-assets.mjs
      - name: Generate provenance attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: release-assets/checksums.txt
      - name: Generate SBOM attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-checksums: release-assets/checksums.txt
          sbom-path: release-assets/cifence-sbom.spdx.json
      - name: Upload GitHub Release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag-name }}
        run: |
          set -euo pipefail
          existing="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          for path in release-assets/*; do
            name="$(basename "$path")"
            if grep -Fxq "$name" <<<"$existing"; then
              echo "Release asset already exists: $name"
              exit 1
            fi
          done
          gh release upload "$RELEASE_TAG" release-assets/* --repo "$GITHUB_REPOSITORY"
      - name: Verify GitHub Release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-please.outputs.tag-name }}
        run: |
          set -euo pipefail
          assets="$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name')"
          for name in \
            cifence-linux-amd64 \
            cifence-linux-arm64 \
            cifence-darwin-amd64 \
            cifence-darwin-arm64 \
            cifence-windows-amd64.exe \
            cifence-sbom.spdx.json \
            provenance.json \
            checksums.txt; do
            if ! grep -Fxq "$name" <<<"$assets"; then
              echo "Missing release asset: $name"
              exit 1
            fi
          done
