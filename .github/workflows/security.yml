name: Security

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan:
    if: github.repository == 'oaslananka-lab/cifence' && (github.event_name != 'pull_request' || github.event.pull_request.draft == false)
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: 1.26.3
          cache: true
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.14.1
      - name: Enable pnpm
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare pnpm@11.0.8 --activate
      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.3.8
          python3 -m pip install --user zizmor==1.24.1
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Workflow lint
        shell: bash
        run: |
          set -euo pipefail
          actionlint
      - name: Workflow security lint
        shell: bash
        run: |
          set -euo pipefail
          zizmor --offline --min-severity low .github/workflows
      - name: Secret scan
        shell: bash
        run: |
          set -euo pipefail
          gitleaks detect --no-git --redact --source .
      - name: Dependency audit
        shell: bash
        run: |
          set -euo pipefail
          pnpm audit --audit-level high
          osv-scanner scan source -r .
      - name: CIFence self scan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p cifence-results
          go run ./cmd/cifence scan --path . --mode enforce --format sarif --sarif cifence-results/cifence.sarif
      - name: Upload CIFence SARIF
        if: hashFiles('cifence-results/cifence.sarif') != ''
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          sarif_file: cifence-results/cifence.sarif
