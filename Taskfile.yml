version: "3"

tasks:
  format:
    cmds:
      - gofmt -w cmd internal
      - pnpm run format

  format:check:
    cmds:
      - node -e "const {execFileSync}=require('node:child_process'); const out=execFileSync('gofmt',['-l','cmd','internal'],{encoding:'utf8'}); if(out.trim()){process.stderr.write(out); process.exit(1)}"
      - pnpm run format:check

  lint:
    cmds:
      - go vet ./...
      - pnpm run lint

  typecheck:
    cmds:
      - pnpm run typecheck

  test:
    cmds:
      - go test ./...

  fuzz:
    cmds:
      - pnpm run fuzz

  schemas:
    cmds:
      - pnpm run schemas

  security:
    cmds:
      - pnpm run security

  build:
    cmds:
      - pnpm run binaries
      - pnpm run build

  action:build:
    cmds:
      - pnpm run action:build

  smoke:action:
    cmds:
      - pnpm run smoke:action

  dist:fresh:
    cmds:
      - pnpm run dist:fresh

  fixtures:
    cmds:
      - pnpm run fixtures

  release:dry-run:
    cmds:
      - pnpm run release:dry-run

  sync:check:
    cmds:
      - pnpm run sync:check

  ci:
    cmds:
      - task: format:check
      - task: lint
      - task: typecheck
      - task: test
      - task: fuzz
      - task: fixtures
      - task: schemas
      - task: action:build
      - task: smoke:action
      - task: dist:fresh
      - task: security
      - task: build
      - task: release:dry-run
      - task: sync:check
