name: Artifact Name Untrusted Context

on:
  issue_comment:

permissions:
  contents: read

jobs:
  upload:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/upload-artifact@0123456789abcdef0123456789abcdef01234567
        with:
          name: ${{ github.event.comment.body }}
          path: README.md
