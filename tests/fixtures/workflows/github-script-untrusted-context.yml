name: GitHub Script Untrusted Context

on:
  pull_request:

permissions:
  contents: read

jobs:
  comment:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@0123456789abcdef0123456789abcdef01234567
        with:
          script: |
            core.info("${{ github.event.pull_request.body }}")
