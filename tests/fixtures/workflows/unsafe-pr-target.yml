name: Unsafe Pull Request Target

on:
  pull_request_target:

permissions:
  contents: read
  pull-requests: write

jobs:
  inspect:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.head.sha }}
