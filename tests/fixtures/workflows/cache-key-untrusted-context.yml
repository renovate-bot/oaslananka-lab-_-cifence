name: Cache Key Untrusted Context

on:
  issues:

permissions:
  contents: read

jobs:
  cache:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/cache@0123456789abcdef0123456789abcdef01234567
        with:
          path: .cache
          key: ${{ github.event.issue.title }}
